<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Imagecut</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <div class="titlebar">
          <div>
            <h1>Imagecut</h1>
            <p>그리드 이미지를 미리 확인하고 행/열 기준으로 잘라 ZIP으로 저장합니다.</p>
          </div>
        </div>

        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}

        <form action="/cut" method="post" enctype="multipart/form-data" class="tool" id="cutForm">
          <input type="hidden" name="crop_rects" id="cropRectsInput">
          <div class="split">
            <div class="preview-panel">
              <canvas id="previewCanvas" width="960" height="640" aria-label="Grid preview"></canvas>
              <div class="placeholder" id="placeholder">PNG/JPEG 이미지를 선택하세요.</div>
            </div>

            <div class="side-panel">
              <div class="generate-panel">
                <label>
                  Provider
                  <select id="providerInput" name="provider">
                    <option value="mock" selected>Mock - 무료 로컬 생성</option>
                    <option value="openai">OpenAI - 비용 발생 가능</option>
                  </select>
                </label>
                <label>
                  Prompt
                  <textarea id="promptInput" name="prompt" rows="3" placeholder="예: 귀여운 로봇 스티커 3x3"></textarea>
                </label>
                <div class="openai-fields" id="openaiFields" hidden>
                  <label>
                    Model
                    <input id="modelInput" name="model" value="gpt-image-2">
                  </label>
                  <label>
                    Size
                    <select id="sizeInput" name="size">
                      <option value="1024x1024" selected>1024x1024</option>
                      <option value="1536x1024">1536x1024</option>
                      <option value="1024x1536">1024x1536</option>
                    </select>
                  </label>
                  <label>
                    Quality
                    <select id="qualityInput" name="quality">
                      <option value="low" selected>low</option>
                      <option value="medium">medium</option>
                      <option value="high">high</option>
                      <option value="auto">auto</option>
                    </select>
                  </label>
                  <label>
                    Cost confirm
                    <input id="confirmInput" name="openai_confirm" placeholder="ALLOW_COST">
                  </label>
                </div>
                <button type="button" id="generateButton">생성</button>
                <span id="generateNote">Mock은 OpenAI API를 호출하지 않습니다.</span>
              </div>

              <label class="file-button">
                <input id="imageInput" type="file" name="image" accept="image/png,image/jpeg" required>
                <span>이미지 선택</span>
              </label>

              <div class="quick-actions">
                <button type="button" data-preset="2x2">2x2</button>
                <button type="button" data-preset="3x3">3x3</button>
                <button type="button" data-preset="4x4">4x4</button>
                <button type="button" id="sampleButton">샘플 생성</button>
              </div>

              <div class="controls">
                <label>
                  Rows
                  <input data-grid-control type="number" name="rows" min="1" max="8" value="3">
                </label>
                <label>
                  Cols
                  <input data-grid-control type="number" name="cols" min="1" max="8" value="3">
                </label>
                <label>
                  Margin px
                  <input data-grid-control type="number" name="margin" min="0" value="0">
                </label>
                <label>
                  Gutter px
                  <input data-grid-control type="number" name="gutter" min="0" value="0">
                </label>
              </div>

              <dl class="metrics">
                <div>
                  <dt>원본</dt>
                  <dd id="sourceMetric">-</dd>
                </div>
                <div>
                  <dt>컷 크기</dt>
                  <dd id="cellMetric">-</dd>
                </div>
                <div>
                  <dt>출력 개수</dt>
                  <dd id="countMetric">9</dd>
                </div>
              </dl>

              <div class="manual-panel">
                <div class="manual-head">
                  <strong>선택 셀</strong>
                  <span id="selectedMetric">-</span>
                </div>
                <div class="nudge-grid">
                  <button type="button" data-adjust="up">위</button>
                  <button type="button" data-adjust="down">아래</button>
                  <button type="button" data-adjust="left">왼쪽</button>
                  <button type="button" data-adjust="right">오른쪽</button>
                  <button type="button" data-adjust="shrink">축소</button>
                  <button type="button" data-adjust="grow">확대</button>
                  <button type="button" data-adjust="reset">리셋</button>
                </div>
              </div>

              <div class="notice" id="notice">3x3 또는 2x2가 안정적입니다. 4x4 이상은 컷 해상도가 작아질 수 있습니다.</div>

              <button type="submit">ZIP 다운로드</button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
