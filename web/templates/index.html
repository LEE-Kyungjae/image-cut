<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Imagecut</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <div class="titlebar">
          <div>
            <h1>Imagecut</h1>
            <p>그리드 이미지를 미리 확인하고 행/열 기준으로 잘라 ZIP으로 저장합니다.</p>
          </div>
        </div>

        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}

        <form action="/cut" method="post" enctype="multipart/form-data" class="tool" id="cutForm">
          <div class="split">
            <div class="preview-panel">
              <canvas id="previewCanvas" width="960" height="640" aria-label="Grid preview"></canvas>
              <div class="placeholder" id="placeholder">PNG/JPEG 이미지를 선택하세요.</div>
            </div>

            <div class="side-panel">
              <label class="file-button">
                <input id="imageInput" type="file" name="image" accept="image/png,image/jpeg" required>
                <span>이미지 선택</span>
              </label>

              <div class="controls">
                <label>
                  Rows
                  <input data-grid-control type="number" name="rows" min="1" max="8" value="3">
                </label>
                <label>
                  Cols
                  <input data-grid-control type="number" name="cols" min="1" max="8" value="3">
                </label>
                <label>
                  Margin px
                  <input data-grid-control type="number" name="margin" min="0" value="0">
                </label>
                <label>
                  Gutter px
                  <input data-grid-control type="number" name="gutter" min="0" value="0">
                </label>
              </div>

              <dl class="metrics">
                <div>
                  <dt>원본</dt>
                  <dd id="sourceMetric">-</dd>
                </div>
                <div>
                  <dt>컷 크기</dt>
                  <dd id="cellMetric">-</dd>
                </div>
                <div>
                  <dt>출력 개수</dt>
                  <dd id="countMetric">9</dd>
                </div>
              </dl>

              <div class="notice" id="notice">3x3 또는 2x2가 안정적입니다. 4x4 이상은 컷 해상도가 작아질 수 있습니다.</div>

              <button type="submit">ZIP 다운로드</button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
