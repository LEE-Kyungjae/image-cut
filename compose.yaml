services:
  imagecut:
    build: .
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      IMAGECUT_OPENAI_ENABLED: "${IMAGECUT_OPENAI_ENABLED:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
